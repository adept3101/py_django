<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Унифицированный просмотр фидов</title>
    <link href="{% static 'users/css/style.css' %}" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .tab-content {
            padding: 20px;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            border-radius: 0 0 5px 5px;
        }
        .nav-tabs .nav-link.active {
            font-weight: bold;
        }
        .data-table {
            margin-top: 20px;
        }
        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }
        .section-title {
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .search-container {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .pagination-container {
            margin-top: 20px;
        }
        .table-responsive {
            overflow-x: auto;
        }
        .table th {
            white-space: nowrap;
            position: sticky;
            top: 0;
            background: white;
        }
    </style>
</head>
    <body>
        <!--{% if user.is_authenticated %}
        <p>Привет, {{ user.username }} | <a href="{% url 'logout' %}">Выйти</a></p>
        {% endif %}

        <a href="{% url ''%}">ФИНЦерт</a>
        <a href="{% url ''%}">МВД</a>
        <a href="{% url ''%}">IOC</a>-->

        <ul class="nav nav-tabs" id="feedsTabs" role="tablist">
            {%if user.role == 'analyst' or user.role == 'admin'%}
            <li class="nav-item" role="presentation">
                <!--<button class="nav-link active" id="fincert-tab" data-bs-toggle="tab" data-bs-target="#fincert" type="button" role="tab">ФинЦерт</button> -->
                <a href="{% url ''%}">ФИНЦерт</a>
            </li>
            {% endif %}

            {%if user.role == 'analyst' or user.role == 'admin'%}
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="mvd-tab" data-bs-toggle="tab" data-bs-target="#mvd" type="button" role="tab">МВД</button>
            </li>
            {% endif %}

            {%if user.role == 'network_admin' or user.role == 'admin'%}
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="ioc-tab" data-bs-toggle="tab" data-bs-target="#ioc" type="button" role="tab">IOC</button>
            </li>
            {% endif %}
        </ul>

    </body>
</head>
</html>
